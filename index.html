<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda Online</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Vue -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.47/vue.global.prod.js"></script>
</head>
<body>

<div id="app" class="container mt-5">

    <h1 class="mb-4">Tienda de Ropa</h1>

    <!-- Botón para cambiar orden -->
    <button 
        class="btn btn-secondary mb-4"
        @click="cambiarOrden">
        Cambiar Orden
    </button>

    <div class="row">

        <!-- PRODUCTOS -->
        <div 
            class="col-md-8"
            :class="ordenInvertido ? 'order-md-1' : 'order-md-2'">

            <div class="row">
                <div class="col-md-6" v-for="(producto, index) in productos" :key="index">
                    <div class="card mb-4">

                        <img 
                            :src="producto.imagen" 
                            class="card-img-top"
                            alt="Imagen del producto">

                        <div class="card-body">
                            <h5 class="card-title">{{ producto.nombre }}</h5>
                            <p class="card-text">Precio: ${{ producto.precio }}</p>
                            <button 
                                class="btn btn-primary"
                                @click="agregarPrenda(producto.nombre)">
                                Agregar
                            </button>
                        </div>

                    </div>
                </div>
            </div>

        </div>

        <!-- CARRITO -->
        <div 
            class="col-md-4"
            :class="ordenInvertido ? 'order-md-2' : 'order-md-1'">

            <h2>Carrito</h2>
            <ul class="list-group">
                <li class="list-group-item d-flex justify-content-between align-items-center"
                    v-for="(prenda, index) in prendas"
                    :key="index">
                    {{ prenda }}
                    <button class="btn btn-danger btn-sm"
                        @click="eliminarPrenda(index)">
                        Eliminar
                    </button>
                </li>
            </ul>

        </div>

    </div>

</div>

<script src="./JS/main.js"></script>
</body>
</html>
